replicaCount: ${{ values.app_replica }}
image:
  repository: 454143665149.dkr.ecr.ap-south-1.amazonaws.com/${{ values.app_name }}
  pullPolicy: IfNotPresent
  tag: 

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}


securityContext: {}


service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  ingressClassName: alb # Tells EKS to trigger the AWS Load Balancer Controller  
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing    
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'

  hosts:
    - host: "" # Put your target routing domain here
      paths:
        - path: /
          pathType: Prefix
          backend:
            service:
              name: ${{ values.app_name }}
              port:
                number: 5000
resources:
  requests:
    cpu: ${{ values.app_requests_cpu }}
    memory: ${{ values.app_requests_memory }}

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/v1/healthz
    port: http
readinessProbe:
  httpGet:
    path: /api/v1/healthz
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []


nodeSelector: {}

tolerations: []

affinity: {}
