replicaCount: ${{ values.replica_count }}
image:
  repository: 454143665149.dkr.ecr.ap-south-1.amazonaws.com/${{ values.app_name }}
  pullPolicy: IfNotPresent
  tag: 

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: false
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}


securityContext: {}


service:
  type: ClusterIP
  port: 5000

ingress:
  enabled: true
  ingressClassName: alb # Tells EKS to trigger the AWS Load Balancer Controller
  
  annotations:
    # Makes the ALB accessible from the public internet
    alb.ingress.kubernetes.io/scheme: internet-facing
    
    # Target-type 'ip' routes traffic directly to your pods (Recommended for EKS)
    alb.ingress.kubernetes.io/target-type: ip
    
    # Opens up ports 80 (HTTP) and 443 (HTTPS) on the AWS Load Balancer
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
    
    # Automatically redirects all insecure port 80 traffic to port 443 (HTTPS)
    alb.ingress.kubernetes.io/ssl-redirect: '443'
    
    # CRITICAL: Replace this with your actual AWS Certificate Manager ARN for SSL
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-south-1:454143665149:certificate/8288fd89-6f35-4e59-b13c-ebf9a602db51
    
    # --- Health Checks (Tailor to your Python app) ---
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'

  hosts:
    - host: "" # Put your target routing domain here
      paths:
        - path: /
          pathType: Prefix
  tls: []
resources:
  requests:
    cpu: ${{ values.cpu_request }}
    memory: ${{ values.memory_request }}

# This is to setup the liveness and readiness probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
livenessProbe:
  httpGet:
    path: /api/v1/healthz
    port: http
readinessProbe:
  httpGet:
    path: /api/v1/healthz
    port: http

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

volumes: []

volumeMounts: []


nodeSelector: {}

tolerations: []

affinity: {}
