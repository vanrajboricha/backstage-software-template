name: ${{ values.app_name }}-cicd

on:
  push:
    paths:
      - src/**
    branches:
      - main

permissions:
  id-token: write
  contents: write

jobs:

  # ── CI: Build & Push Docker image ─────────────────────────────────
  ci:
    runs-on: ubuntu-latest
    outputs:
      commit_id: ${{ '${{ steps.expose_id.outputs.COMMIT_ID }}' }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Shorten commit id
        id: expose_id
        shell: bash
        run: |
          SHORT_SHA=$(echo "${{ '${{ github.sha }}' }}" | cut -c1-6)
          echo "COMMIT_ID=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "COMMIT_ID=$SHORT_SHA" >> "$GITHUB_ENV"

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ '${{ secrets.AWS_ACCESS_KEY_ID }}' }}
          aws-secret-access-key: ${{ '${{ secrets.AWS_SECRET_ACCESS_KEY }}' }}
          aws-region:            ap-south-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push to AWS ECR
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: 454143665149.dkr.ecr.ap-south-1.amazonaws.com/${{ values.app_name }}:${{ '${{ env.COMMIT_ID }}' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── CD DEV: Auto deploy — no approval needed ───────────────────────
  cd-dev:
    needs: ci
    runs-on: [self-hosted, eks-self-hosted]

    # ── No protection rules on dev environment ─────────────────────
    environment:
      name: dev
      url: http://dev.${{ values.app_name }}.your-domain.com   # shown in GitHub UI

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Modify DEV values file via yq
        shell: bash
        run: |
          curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o ./yq
          chmod +x ./yq
          ./yq e -i \
            '.image.tag = "'"${{ '${{ needs.ci.outputs.commit_id }}' }}"'"' \
            charts/${{ values.app_name }}/values-dev.yaml

      - name: Commit DEV manifest changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore(cd): updates values-${{ values.app_env }}.yaml with commit tag ${{ '${{ needs.ci.outputs.commit_id }}' }}"
          default_author: github_actions
          pull: '--rebase --autostash'
          push: true

      - name: Install ArgoCD CLI
        shell: bash
        run: |
          curl -sSL -o ./argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x ./argocd

      - name: Login to ArgoCD
        shell: bash
        run: |
          ./argocd login argocd-server.argocd.svc.cluster.local:443 \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}

      - name: Ensure ArgoCD DEV App Exists
        shell: bash
        run: |
          REPO="https://github.com/vanraj-boricha/${{ values.app_name }}.git"
          ./argocd repo list | grep -q "$REPO" || \
            ./argocd repo add "$REPO"

          if ! ./argocd app get ${{ values.app_name }} >/dev/null 2>&1; then
            ./argocd app create ${{ values.app_name }} \
              --repo "$REPO" \
              --path charts/${{ values.app_name }} \
              --dest-namespace dev \
              --dest-server https://kubernetes.default.svc \
              --values values-dev.yaml \
              --revision main \
              --sync-policy manual \
              --sync-option CreateNamespace=true
          fi

      - name: Sync DEV and Wait
        shell: bash
        run: |
          ./argocd app sync ${{ values.app_name }}
          ./argocd app wait ${{ values.app_name }} --timeout 180

      - name: Print DEV deployment summary
        shell: bash
        run: |
          echo "## ✅ DEV Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ values.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ '${{ needs.ci.outputs.commit_id }}' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | dev |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed ✅ |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⏳ **PROD deployment waiting for approval**" >> $GITHUB_STEP_SUMMARY

  # ── CD PROD: Requires manual approval ─────────────────────────────
  cd-prod:
    needs: [ci, cd-dev]
    runs-on: [self-hosted, eks-self-hosted]

    # ── prod environment has Required reviewers set ────────────────
    # ── This pauses here until someone approves ────────────────────
    environment:
      name: prod
      url: http://${{ values.app_name }}.your-domain.com

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Modify PROD values file via yq
        shell: bash
        run: |
          curl -L https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 \
            -o ./yq
          chmod +x ./yq
          ./yq e -i \
            '.image.tag = "'"${{ '${{ needs.ci.outputs.commit_id }}' }}"'"' \
            charts/${{ values.app_name }}/values-prod.yaml

      - name: Commit PROD manifest changes
        uses: EndBug/add-and-commit@v9
        with:
          message: "chore(cd): updates values-${{ values.app_env }}.yaml with commit tag ${{ '${{ needs.ci.outputs.commit_id }}' }}"
          default_author: github_actions
          pull: '--rebase --autostash'
          push: true

      - name: Install ArgoCD CLI
        shell: bash
        run: |
          curl -sSL -o ./argocd \
            https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64
          chmod +x ./argocd

      - name: Login to ArgoCD
        shell: bash
        run: |
          ./argocd login argocd-server.argocd.svc.cluster.local:443 \
            --insecure \
            --grpc-web \
            --username admin \
            --password ${{ '${{ secrets.ARGOCD_PASSWORD }}' }}

      - name: Ensure ArgoCD PROD App Exists
        shell: bash
        run: |
          REPO="https://github.com/vanraj-boricha/${{ values.app_name }}.git"

          if ! ./argocd app get ${{ values.app_name }} >/dev/null 2>&1; then
            ./argocd app create ${{ values.app_name }} \
              --repo "$REPO" \
              --path charts/${{ values.app_name }} \
              --dest-namespace prod \
              --dest-server https://kubernetes.default.svc \
              --values values-prod.yaml \
              --revision main \
              --sync-policy manual \
              --sync-option CreateNamespace=true
          fi

      - name: Sync PROD and Wait
        shell: bash
        run: |
          ./argocd app sync ${{ values.app_name }}
          ./argocd app wait ${{ values.app_name }} --timeout 180

      - name: Print PROD deployment summary
        shell: bash
        run: |
          echo "## 🚀 PROD Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Key | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| App | ${{ values.app_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Image Tag | ${{ '${{ needs.ci.outputs.commit_id }}' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Namespace | prod |" >> $GITHUB_STEP_SUMMARY
          echo "| Status | Deployed 🚀 |" >> $GITHUB_STEP_SUMMARY