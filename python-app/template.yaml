apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: python-app
  title: Python flask template
  description: Provisions a minimalistic flask application
spec:
  owner: development
  type: service

  parameters:
    - title: Fill in some steps
      required:
        - component_id
        - environment
        - replica_count
        - prod_approver

      properties:
        component_id:
          title: Component name
          type: string
          description: Provide a component (microservice) name
          pattern: '^([a-zA-Z][a-zA-Z0-9]*)(-[a-zA-Z0-9]+)*$'

        environment:
          title: Environment
          type: string
          description: The environment where this component will be deployed
          enum:
            - dev
            - prod

        replica_count:
          title: Replica Count
          type: integer
          description: Number of pod replicas
          default: 1

        prod_approver:
          title: PROD Approver GitHub Username
          type: string
          description: GitHub username who will approve PROD deployments
          ui:autofocus: false

        cpu_request:
          title: CPU Request
          type: string
          description: CPU request for the container
          default: 40m

        memory_request:
          title: Memory Request
          type: string
          description: Memory request for the container
          default: 40Mi

  steps:
    - id: fetch-base
      name: Fetch Base
      action: fetch:template
      input:
        url: ./template
        values:
          app_name: ${{parameters.component_id}}
          app_env: ${{parameters.environment}}
          app_replica: ${{parameters.replica_count}}
          app_requests_cpu: ${{parameters.cpu_request}}
          app_requests_memory: ${{parameters.memory_request}}


    - id: publish
      name: Publish
      action: publish:github
      input:
        #allowedHosts:
        #  - github.com
        description: This is ${{ parameters.component_id }}
        repoUrl: github.com?owner=vanraj-boricha&repo=${{parameters.component_id}}
        protectDefaultBranch: false
        repoVisibility: public

    # ── Create DEV environment — no approval ──────────────────────
    - id: create-env-dev
      name: Create DEV Environment
      action: github:environment:create
      input:
        repoUrl: github.com?owner=vanraj-boricha&repo=${{parameters.component_id}}
        name: dev
        deploymentBranchPolicy:
          protected_branches: false                 
          custom_branch_policies: false             

    # ── Create PROD environment — with approval ────────────────────
    - id: create-env-prod
      name: Create PROD Environment
      action: github:environment:create
      input:
        repoUrl: github.com?owner=vanraj-boricha&repo=${{parameters.component_id}}
        name: prod
        reviewers: ${{ parameters.prod_approver }}
        deploymentBranchPolicy:
          protected_branches: true                  
          custom_branch_policies: false             

    - id: register
      name: Register
      action: catalog:register
      input:
        repoContentsUrl: ${{ steps['publish'].output.repoContentsUrl }}
        catalogInfoPath: "/catalog-info.yaml"

  output:
    links:
      - title: Repository
        url: ${{ steps['publish'].output.remoteUrl }}
