replicaCount: 3

image:
  repository: ${{ values.ecr_repo }}
  pullPolicy: Always
  tag: "latest"              # updated by yq in CD pipeline

service:
  type: ClusterIP
  port: 80
  targetPort: ${{ values.port }}

ingress:
  enabled: true
  ingressClassName: alb
  annotations:
    alb.ingress.kubernetes.io/scheme: internal
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}]'
    alb.ingress.kubernetes.io/healthcheck-path: /health
    alb.ingress.kubernetes.io/healthcheck-port: traffic-port
    alb.ingress.kubernetes.io/success-codes: '200'
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: '15'
    alb.ingress.kubernetes.io/healthcheck-timeout-seconds: '5'
  hosts:
    - host: ""
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

env:
  - name: PORT
    value: "${{ values.port }}"
  - name: NODE_ENV
    value: "production"

monitoring:
  enabled: {{ values.enable_prometheus }}
{% if values.enable_prometheus %}
  portName: http
  metricsPath: {{ values.prometheus_metrics_path }}
  scrapeInterval: {{ values.prometheus_scrape_interval }}
  scrapeTimeout: 10s
  dashboard:
    enabled: true
  alerting:
    enabled: true
    memoryThresholdBytes: 300000000
    cpuThresholdPercent: 80
{% endif %}